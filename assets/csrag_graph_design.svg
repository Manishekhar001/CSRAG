<svg viewBox="0 0 1100 1020" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="1100" height="1020" fill="#0F1117" rx="12"/>

  <!-- Title -->
  <text x="550" y="40" text-anchor="middle" fill="#F0F0F0" font-size="18" font-weight="700" letter-spacing="1">CSRAG — LangGraph Pipeline</text>
  <text x="550" y="62" text-anchor="middle" fill="#6B7280" font-size="11">Corrective + Self-Reflective RAG with Memory</text>

  <!-- ─── LEGEND ─────────────────────────────── -->
  <rect x="30" y="78" width="12" height="12" rx="2" fill="#3B82F6"/>
  <text x="48" y="89" fill="#9CA3AF" font-size="10">Core node</text>
  <rect x="120" y="78" width="12" height="12" rx="2" fill="#10B981"/>
  <text x="138" y="89" fill="#9CA3AF" font-size="10">CRAG</text>
  <rect x="190" y="78" width="12" height="12" rx="2" fill="#8B5CF6"/>
  <text x="208" y="89" fill="#9CA3AF" font-size="10">SRAG</text>
  <rect x="260" y="78" width="12" height="12" rx="2" fill="#F59E0B"/>
  <text x="278" y="89" fill="#9CA3AF" font-size="10">Memory</text>
  <rect x="340" y="78" width="12" height="12" rx="2" fill="#EF4444"/>
  <text x="358" y="89" fill="#9CA3AF" font-size="10">Web Search</text>
  <line x1="430" y1="84" x2="460" y2="84" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="465" y="89" fill="#9CA3AF" font-size="10">Conditional edge</text>
  <line x1="575" y1="84" x2="605" y2="84" stroke="#4B5563" stroke-width="1.5"/>
  <text x="610" y="89" fill="#9CA3AF" font-size="10">Fixed edge</text>

  <!-- ═══════════════════════════════════════════════
       NODES
  ═══════════════════════════════════════════════ -->

  <!-- START -->
  <circle cx="550" cy="118" r="18" fill="#1F2937" stroke="#4B5563" stroke-width="1.5"/>
  <text x="550" y="123" text-anchor="middle" fill="#9CA3AF" font-size="11" font-weight="600">START</text>

  <!-- ltm_remember -->
  <rect x="415" y="158" width="270" height="44" rx="8" fill="#1C2033" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="550" y="175" text-anchor="middle" fill="#FCD34D" font-size="12" font-weight="600">ltm_remember</text>
  <text x="550" y="192" text-anchor="middle" fill="#9CA3AF" font-size="10">Extract + store user facts · read LTM context</text>

  <!-- decide_retrieval -->
  <rect x="415" y="228" width="270" height="44" rx="8" fill="#1C2033" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="550" y="245" text-anchor="middle" fill="#93C5FD" font-size="12" font-weight="600">decide_retrieval</text>
  <text x="550" y="262" text-anchor="middle" fill="#9CA3AF" font-size="10">LLM classifier · private doc? or general knowledge?</text>

  <!-- generate_direct (LEFT branch) -->
  <rect x="90" y="310" width="240" height="44" rx="8" fill="#1C2033" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="210" y="327" text-anchor="middle" fill="#93C5FD" font-size="12" font-weight="600">generate_direct</text>
  <text x="210" y="344" text-anchor="middle" fill="#9CA3AF" font-size="10">Answer from LLM training knowledge</text>

  <!-- retrieve_docs (RIGHT branch) -->
  <rect x="760" y="310" width="240" height="44" rx="8" fill="#1C2033" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="880" y="327" text-anchor="middle" fill="#93C5FD" font-size="12" font-weight="600">retrieve_docs</text>
  <text x="880" y="344" text-anchor="middle" fill="#9CA3AF" font-size="10">Qdrant similarity search · top-k chunks</text>

  <!-- evaluate_docs (CRAG) -->
  <rect x="760" y="390" width="240" height="44" rx="8" fill="#1C2033" stroke="#10B981" stroke-width="1.5"/>
  <text x="880" y="407" text-anchor="middle" fill="#6EE7B7" font-size="12" font-weight="600">evaluate_docs  (CRAG)</text>
  <text x="880" y="424" text-anchor="middle" fill="#9CA3AF" font-size="10">Score chunks 0–1 · concurrent asyncio.gather</text>

  <!-- rewrite_query -->
  <rect x="820" y="470" width="220" height="44" rx="8" fill="#1C2033" stroke="#EF4444" stroke-width="1.5"/>
  <text x="930" y="487" text-anchor="middle" fill="#FCA5A5" font-size="12" font-weight="600">rewrite_query</text>
  <text x="930" y="504" text-anchor="middle" fill="#9CA3AF" font-size="10">LLM rewrites question as web search query</text>

  <!-- web_search -->
  <rect x="820" y="548" width="220" height="44" rx="8" fill="#1C2033" stroke="#EF4444" stroke-width="1.5"/>
  <text x="930" y="565" text-anchor="middle" fill="#FCA5A5" font-size="12" font-weight="600">web_search</text>
  <text x="930" y="582" text-anchor="middle" fill="#9CA3AF" font-size="10">Tavily API · returns web Documents</text>

  <!-- refine_context -->
  <rect x="415" y="470" width="270" height="44" rx="8" fill="#1C2033" stroke="#10B981" stroke-width="1.5"/>
  <text x="550" y="487" text-anchor="middle" fill="#6EE7B7" font-size="12" font-weight="600">refine_context</text>
  <text x="550" y="504" text-anchor="middle" fill="#9CA3AF" font-size="10">Batch sentence filter · 1 LLM call for all sentences</text>

  <!-- generate_answer -->
  <rect x="415" y="548" width="270" height="44" rx="8" fill="#1C2033" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="550" y="565" text-anchor="middle" fill="#93C5FD" font-size="12" font-weight="600">generate_answer</text>
  <text x="550" y="582" text-anchor="middle" fill="#9CA3AF" font-size="10">RAG prompt · answer from refined context only</text>

  <!-- verify_support (SRAG) -->
  <rect x="415" y="628" width="270" height="44" rx="8" fill="#1C2033" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="550" y="645" text-anchor="middle" fill="#C4B5FD" font-size="12" font-weight="600">verify_support  (SRAG)</text>
  <text x="550" y="662" text-anchor="middle" fill="#9CA3AF" font-size="10">Is every claim grounded in context?</text>

  <!-- revise_answer (SRAG) -->
  <rect x="760" y="628" width="240" height="44" rx="8" fill="#1C2033" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="880" y="645" text-anchor="middle" fill="#C4B5FD" font-size="12" font-weight="600">revise_answer  (SRAG)</text>
  <text x="880" y="662" text-anchor="middle" fill="#9CA3AF" font-size="10">Remove unsupported claims · max 2 revisions</text>

  <!-- verify_usefulness (SRAG) — SHARED by both paths -->
  <rect x="415" y="714" width="270" height="44" rx="8" fill="#1C2033" stroke="#8B5CF6" stroke-width="2"/>
  <text x="550" y="731" text-anchor="middle" fill="#C4B5FD" font-size="12" font-weight="600">verify_usefulness  (SRAG)</text>
  <text x="550" y="748" text-anchor="middle" fill="#9CA3AF" font-size="10">Does the answer address the question? · useful / not_useful</text>
  <!-- "shared" badge -->
  <rect x="658" y="714" width="60" height="18" rx="4" fill="#7C3AED" opacity="0.7"/>
  <text x="688" y="727" text-anchor="middle" fill="#EDE9FE" font-size="9" font-weight="600">SHARED</text>

  <!-- rewrite_question -->
  <rect x="60" y="714" width="260" height="44" rx="8" fill="#1C2033" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="190" y="731" text-anchor="middle" fill="#93C5FD" font-size="12" font-weight="600">rewrite_question</text>
  <text x="190" y="748" text-anchor="middle" fill="#9CA3AF" font-size="10">Reformulate for better retrieval · max 2 rewrites</text>

  <!-- stm_summarize -->
  <rect x="415" y="814" width="270" height="44" rx="8" fill="#1C2033" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="550" y="831" text-anchor="middle" fill="#FCD34D" font-size="12" font-weight="600">stm_summarize</text>
  <text x="550" y="848" text-anchor="middle" fill="#9CA3AF" font-size="10">Compress conversation if messages &gt; threshold</text>

  <!-- END -->
  <circle cx="550" cy="930" r="18" fill="#1F2937" stroke="#4B5563" stroke-width="1.5"/>
  <circle cx="550" cy="930" r="11" fill="#4B5563"/>
  <text x="550" y="935" text-anchor="middle" fill="#9CA3AF" font-size="11" font-weight="600">END</text>

  <!-- ═══════════════════════════════════════════════
       EDGES
  ═══════════════════════════════════════════════ -->

  <!-- START → ltm_remember -->
  <line x1="550" y1="136" x2="550" y2="158" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ltm_remember → decide_retrieval -->
  <line x1="550" y1="202" x2="550" y2="228" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- decide_retrieval → generate_direct (False / left) -->
  <path d="M 460 250 L 330 250 L 330 310" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowDash)"/>
  <rect x="344" y="263" width="60" height="16" rx="4" fill="#1F2937"/>
  <text x="374" y="275" text-anchor="middle" fill="#60A5FA" font-size="9" font-weight="600">False</text>

  <!-- decide_retrieval → retrieve_docs (True / right) -->
  <path d="M 640 250 L 760 250 L 880 250 L 880 310" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowDash)"/>
  <rect x="706" y="240" width="50" height="16" rx="4" fill="#1F2937"/>
  <text x="731" y="252" text-anchor="middle" fill="#60A5FA" font-size="9" font-weight="600">True</text>

  <!-- retrieve_docs → evaluate_docs -->
  <line x1="880" y1="354" x2="880" y2="390" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- evaluate_docs → refine_context (CORRECT) -->
  <path d="M 760 412 L 685 412 L 685 492" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowDash)"/>
  <rect x="690" y="405" width="68" height="16" rx="4" fill="#1F2937"/>
  <text x="724" y="417" text-anchor="middle" fill="#34D399" font-size="9" font-weight="600">CORRECT</text>

  <!-- evaluate_docs → rewrite_query (AMBIGUOUS/INCORRECT) -->
  <path d="M 880 434 L 880 470" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowDash)"/>
  <rect x="886" y="446" width="100" height="16" rx="4" fill="#1F2937"/>
  <text x="936" y="458" text-anchor="middle" fill="#F87171" font-size="9" font-weight="600">AMB/INCORRECT</text>

  <!-- rewrite_query → web_search -->
  <line x1="930" y1="514" x2="930" y2="548" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- web_search → refine_context -->
  <path d="M 820 570 L 685 570" stroke="#4B5563" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- refine_context → generate_answer -->
  <line x1="550" y1="514" x2="550" y2="548" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- generate_answer → verify_support -->
  <line x1="550" y1="592" x2="550" y2="628" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- verify_support → verify_usefulness (fully_supported) -->
  <path d="M 550 672 L 550 714" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowDash)"/>
  <rect x="556" y="686" width="100" height="16" rx="4" fill="#1F2937"/>
  <text x="606" y="698" text-anchor="middle" fill="#A78BFA" font-size="9" font-weight="600">fully_supported</text>

  <!-- verify_support → revise_answer (not fully_supported) -->
  <path d="M 685 650 L 760 650" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowDash)"/>
  <rect x="690" y="638" width="64" height="16" rx="4" fill="#1F2937"/>
  <text x="722" y="650" text-anchor="middle" fill="#F87171" font-size="9" font-weight="600">not supported</text>

  <!-- revise_answer → verify_support (loop back) -->
  <path d="M 1000 650 L 1040 650 L 1040 620 L 700 620 L 700 628" stroke="#8B5CF6" stroke-width="1.2" stroke-dasharray="4,3" fill="none" marker-end="url(#arrowPurple)"/>
  <text x="1050" y="638" fill="#A78BFA" font-size="9">↺ max 2×</text>

  <!-- generate_direct → verify_usefulness (NEW direct path) -->
  <path d="M 210 354 L 210 736 L 415 736" stroke="#3B82F6" stroke-width="2" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowBlue)"/>
  <rect x="30" y="575" width="100" height="16" rx="4" fill="#1E3A5F"/>
  <text x="80" y="587" text-anchor="middle" fill="#60A5FA" font-size="9" font-weight="700">NEW: direct path</text>
  <rect x="30" y="595" width="100" height="16" rx="4" fill="#1E3A5F"/>
  <text x="80" y="607" text-anchor="middle" fill="#60A5FA" font-size="9">→ verify_usefulness</text>

  <!-- verify_usefulness → stm_summarize (useful) -->
  <path d="M 550 758 L 550 814" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowDash)"/>
  <rect x="556" y="778" width="44" height="16" rx="4" fill="#1F2937"/>
  <text x="578" y="790" text-anchor="middle" fill="#34D399" font-size="9" font-weight="600">useful</text>

  <!-- verify_usefulness → rewrite_question (not_useful) -->
  <path d="M 415 736 L 320 736" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowDash)"/>
  <rect x="330" y="725" width="74" height="16" rx="4" fill="#1F2937"/>
  <text x="367" y="737" text-anchor="middle" fill="#F87171" font-size="9" font-weight="600">not_useful</text>

  <!-- rewrite_question → retrieve_docs (loop back) -->
  <path d="M 60 736 L 28 736 L 28 332 L 760 332" stroke="#3B82F6" stroke-width="1.2" stroke-dasharray="4,3" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="8" y="540" fill="#60A5FA" font-size="9" transform="rotate(-90 8 540)">↺ max 2×</text>

  <!-- stm_summarize → END -->
  <line x1="550" y1="858" x2="550" y2="912" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════
       CRAG VERDICT LABELS on evaluate_docs
  ═══════════════════════════════════════════════ -->
  <rect x="750" y="436" width="222" height="28" rx="5" fill="#0D2918" stroke="#10B981" stroke-width="1" opacity="0.9"/>
  <text x="861" y="454" text-anchor="middle" fill="#6EE7B7" font-size="9.5">
    <tspan font-weight="700" fill="#34D399">CORRECT</tspan>
    <tspan fill="#6EE7B7"> → refine  </tspan>
    <tspan font-weight="700" fill="#F87171">AMB/INC</tspan>
    <tspan fill="#6EE7B7"> → web</tspan>
  </text>

  <!-- ═══════════════════════════════════════════════
       ARROWHEAD MARKERS
  ═══════════════════════════════════════════════ -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4B5563"/>
    </marker>
    <marker id="arrowDash" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6B7280"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3B82F6"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8B5CF6"/>
    </marker>
  </defs>

</svg>
