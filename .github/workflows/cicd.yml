name: CI Pipeline

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:

    # ─────────────────────────────────────────
    # JOB 1 — Unit Tests
    # Runs first. No Docker, no real services.
    # ─────────────────────────────────────────
    unit_tests:
        name: Unit Tests
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.13"

            - name: Install Dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: Run Unit Tests
              env:
                  GROQ_API_KEY: test-groq-key
                  QDRANT_URL: http://localhost:6333
                  QDRANT_API_KEY: test-qdrant-key
                  TAVILY_API_KEY: test-tavily-key
                  POSTGRES_URI: postgresql://postgres:postgres@localhost:5432/test
                  LOG_LEVEL: WARNING
                  PYTHONPATH: .
              run: |
                  pytest tests/ -v --tb=short --asyncio-mode=auto

    # ─────────────────────────────────────────
    # JOB 2 — Docker Build and Test
    # ─────────────────────────────────────────
    docker_build_test:
        name: Docker Build and Test
        runs-on: ubuntu-latest
        needs: unit_tests

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build Docker Image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: false
                  tags: csrag:${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Test Docker Image
              run: |
                  docker build -t csrag:latest .
                  docker run --rm \
                    -e GROQ_API_KEY=test-groq-key \
                    -e QDRANT_URL=http://localhost:6333 \
                    -e QDRANT_API_KEY=test-qdrant-key \
                    -e TAVILY_API_KEY=test-tavily-key \
                    -e POSTGRES_URI=postgresql://postgres:postgres@localhost:5432/test \
                    csrag:latest python -c "from app.main import app; print('App loaded successfully')"

    # ─────────────────────────────────────────
    # JOB 3 — Deploy to EC2
    # Only runs on push to main (not PRs).
    # Only runs if docker_build_test passes.
    # ─────────────────────────────────────────
    deploy:
        name: Deploy to EC2
        runs-on: ubuntu-latest
        needs: docker_build_test
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and Push Image to Docker Hub
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  tags: ${{ secrets.DOCKERHUB_USERNAME }}/csrag:latest

            - name: Deploy to EC2
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.EC2_HOST }}
                  username: ${{ secrets.EC2_USERNAME }}
                  key: ${{ secrets.EC2_SSH_KEY }}
                  script: |
                      # Ensure Docker network exists
                      docker network create csrag-net 2>/dev/null || true

                      # Start PostgreSQL if not running
                      if ! docker ps | grep -q csrag-postgres; then
                          if docker ps -a | grep -q csrag-postgres; then
                              docker start csrag-postgres
                          else
                              docker run -d \
                                --name csrag-postgres \
                                --network csrag-net \
                                --restart always \
                                -e POSTGRES_USER=postgres \
                                -e POSTGRES_PASSWORD=postgres \
                                -e POSTGRES_DB=postgres \
                                -v postgres_data:/var/lib/postgresql/data \
                                postgres:16
                          fi
                      fi

                      # Wait for Postgres to be ready
                      sleep 5

                      # Deploy CSRAG app
                      docker pull ${{ secrets.DOCKERHUB_USERNAME }}/csrag:latest
                      docker stop csrag || true
                      docker rm csrag || true
                      docker run -d \
                        --name csrag \
                        --restart always \
                        -p 8000:8000 \
                        --env-file /home/ubuntu/.env \
                        --network csrag-net \
                        ${{ secrets.DOCKERHUB_USERNAME }}/csrag:latest
                      docker image prune -f
